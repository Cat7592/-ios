name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
    paths-ignore: ['**.md', '.gitignore', 'LICENSE', 'assets/**']
  workflow_dispatch:

concurrency:
  group: build-ipa-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 💎 Install xcodeproj gem
        run: gem install xcodeproj --no-document

      - name: 🔧 Generate Xcode Project
        run: ruby scripts/create_xcodeproj.rb

      - name: 🔍 Verify Project
        run: |
          echo "=== 项目文件列表 ==="
          ls -la maolaoda-parser.xcodeproj/
          echo ""
          echo "=== xcscheme ==="
          cat maolaoda-parser.xcodeproj/xcshareddata/xcschemes/maolaoda-parser.xcscheme
          echo ""
          echo "=== Swift 版本 ==="
          swift --version
          echo ""
          echo "=== Xcode 版本 ==="
          xcodebuild -version

      - name: 🏗️ Archive (Unsigned)
        run: |
          xcodebuild archive \
            -project maolaoda-parser.xcodeproj \
            -scheme maolaoda-parser \
            -configuration Release \
            -archivePath build/maolaoda-parser.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1

      - name: 📦 Package IPA
        run: |
          mkdir -p Payload
          cp -R build/maolaoda-parser.xcarchive/Products/Applications/猫老大解析助手.app Payload/
          zip -r maolaoda-parser.ipa Payload/
          ls -lh maolaoda-parser.ipa

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: maolaoda-parser-${{ github.sha }}
          path: maolaoda-parser.ipa
          retention-days: 90
          compression-level: 0

      - name: 📊 Summary
        run: |
          echo "=========================================="
          echo "  猫老大解析助手 - 构建成功"
          echo "=========================================="
          echo "  Commit: ${{ github.sha }}"
          echo "  产物: maolaoda-parser.ipa (无签名)"
          echo "  📥 在 Actions 页面底部 Artifacts 下载"
          echo "=========================================="
